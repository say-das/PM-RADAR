<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM Radar Intelligence Report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>

        /* Twilio Brand Colors */
        :root {
            --twilio-red: #F22F46;
            --twilio-blue: #0263E0;
            --twilio-dark-blue: #001489;
            --twilio-blue-60: #0D61D8;
            --twilio-blue-10: #E1EFFC;
            --twilio-gray-100: #121C2D;
            --twilio-gray-90: #18222E;
            --twilio-gray-80: #1F2933;
            --twilio-gray-70: #3E4C59;
            --twilio-gray-60: #606B85;
            --twilio-gray-50: #8891AA;
            --twilio-gray-40: #C4C7D1;
            --twilio-gray-30: #D9DBE5;
            --twilio-gray-20: #E8EAED;
            --twilio-gray-10: #F4F5F6;
        }

        @page {
            size: Letter;
            margin: 0.75in 1in;
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            font-size: 14px;
            line-height: 1.4;
            color: var(--twilio-gray-90);
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 210mm;
            margin: 0 auto;
            padding: 40px 60px;
            background: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            min-height: 297mm;
        }

        @media screen and (max-width: 992px) {
            body {
                padding: 12px;
            }
            .container {
                padding: 24px 32px;
            }
        }

        @media print {
            body {
                padding: 0;
                background: white;
            }
            .container {
                box-shadow: none;
                max-width: 100%;
            }
        }

        /* Typography with Twilio Red Start */
        h1 {
            color: var(--twilio-red);
            font-size: 32px;
            font-weight: 700;
            line-height: 1.1;
            margin: 0 0 6px 0;
            letter-spacing: -0.02em;
        }

        h1 + p {
            color: var(--twilio-gray-60);
            font-size: 13px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 3px solid var(--twilio-red);
            line-height: 1.3;
        }

        h2 {
            color: var(--twilio-blue-60);
            font-size: 24px;
            font-weight: 700;
            line-height: 1.2;
            margin: 24px 0 8px 0;
            page-break-after: avoid;
        }

        h3 {
            color: var(--twilio-gray-90);
            font-size: 18px;
            font-weight: 600;
            line-height: 1.3;
            margin: 16px 0 6px 0;
            page-break-after: avoid;
        }

        /* Paragraphs with hierarchy */
        p {
            margin: 6px 0;
            line-height: 1.5;
            color: var(--twilio-gray-60);
            font-weight: 400;
            font-size: 14px;
        }

        /* Section labels like "Executive Summary:" */
        p strong:first-child {
            color: var(--twilio-gray-80);
            font-weight: 600;
            font-size: 14px;
        }

        /* Default strong styling - subtle */
        strong {
            font-weight: 500;
            color: var(--twilio-gray-70);
        }

        em {
            font-style: italic;
            color: var(--twilio-gray-50);
            font-weight: 400;
        }

        /* Compact lists */
        ul, ol {
            margin: 8px 0;
            padding-left: 24px;
        }

        li {
            margin: 4px 0;
            line-height: 1.5;
            color: var(--twilio-gray-60);
            font-weight: 400;
            font-size: 14px;
        }

        li::marker {
            color: var(--twilio-gray-40);
            font-weight: 400;
        }

        /* All strong tags in lists should be normal weight by default */
        li strong {
            font-weight: 400;
            color: var(--twilio-gray-60);
        }

        /* Only the very first strong in a list item gets emphasis */
        li > strong:first-child {
            font-weight: 500;
            color: var(--twilio-gray-80);
            font-size: 14px;
        }

        /* Executive Summary - Twilio branded */
        #executive-summary + ul {
            background: var(--twilio-blue-10);
            padding: 16px 20px;
            border-radius: 6px;
            border-left: 4px solid var(--twilio-red);
            margin: 12px 0 20px 0;
        }

        #executive-summary + ul li {
            font-weight: 600;
            color: var(--twilio-gray-90);
            font-size: 14px;
            margin: 3px 0;
        }

        #executive-summary + ul li strong {
            font-weight: 700;
            color: var(--twilio-red);
        }

        /* Blockquotes with Twilio accent */
        blockquote {
            margin: 12px 0;
            padding: 10px 16px;
            border-left: 4px solid var(--twilio-blue);
            background: var(--twilio-blue-10);
            font-style: italic;
            color: var(--twilio-gray-70);
            line-height: 1.4;
        }

        /* Code styling */
        code {
            font-family: 'SF Mono', 'Monaco', 'Consolas', monospace;
            background-color: var(--twilio-gray-10);
            color: var(--twilio-dark-blue);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.9em;
        }

        pre {
            background: var(--twilio-gray-10);
            padding: 16px;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--twilio-gray-20);
        }

        pre code {
            background: transparent;
            padding: 0;
        }

        /* Links - Twilio primary blue */
        a {
            color: var(--twilio-blue);
            text-decoration: none;
            font-weight: 500;
        }

        a:hover {
            color: var(--twilio-blue-60);
            text-decoration: underline;
        }

        /* Compact horizontal rules */
        hr {
            border: none;
            border-top: 1px solid var(--twilio-gray-30);
            margin: 16px 0;
        }

        /* Table styling with Twilio colors */
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
        }

        th, td {
            padding: 8px 10px;
            text-align: left;
            border-bottom: 1px solid var(--twilio-gray-30);
            line-height: 1.4;
        }

        th {
            font-weight: 700;
            color: white;
            background: var(--twilio-red);
        }

        tr:hover {
            background: var(--twilio-blue-10);
        }

        /* Inline Citations - smaller and clickable */
        a[href^="#"] {
            color: var(--twilio-blue);
            font-size: 10px;
            font-weight: 600;
            vertical-align: super;
            text-decoration: none;
            padding: 0 1px;
            transition: all 0.2s ease;
        }

        a[href^="#"]:hover {
            color: var(--twilio-red);
            text-decoration: underline;
        }

        /* Make citation brackets appear as superscript links */
        p a[href^="#"],
        li a[href^="#"] {
            font-size: 10px;
            line-height: 0;
        }

        /* Glossary emphasis */
        #glossary + p {
            color: var(--twilio-gray-50);
            font-style: italic;
            margin-bottom: 8px;
            font-size: 12px;
            line-height: 1.4;
        }

        #glossary + p + ul li {
            margin: 5px 0;
        }

        /* Glossary terms should stand out */
        #glossary + p + ul li > strong:first-child {
            color: var(--twilio-red);
            font-weight: 700;
            font-size: 14px;
        }

        /* But the rest of glossary text should be normal */
        #glossary + p + ul li strong:not(:first-child) {
            font-weight: 400;
            color: var(--twilio-gray-60);
        }

        /* Sources section - everything smaller and lighter */
        #sources + p + ul li {
            font-size: 12px;
            color: var(--twilio-gray-50);
            font-weight: 400;
            line-height: 1.4;
            margin: 3px 0;
            scroll-margin-top: 20px; /* Offset for smooth scroll */
            list-style-type: none; /* Remove default bullets */
            padding-left: 0;
        }

        #sources + p + ul li strong {
            font-weight: 400;
            color: var(--twilio-gray-50);
        }

        #sources + p + ul li a {
            font-weight: 500;
            color: var(--twilio-blue);
        }

        /* Citation reference targets in sources list */
        #sources + p + ul li[id] {
            background: transparent;
            transition: background 0.3s ease;
        }

        #sources + p + ul li[id]:target {
            background: var(--twilio-blue-10);
            padding: 4px 8px;
            margin-left: -8px;
            border-radius: 4px;
        }

        /* Footer */
        body > p:last-of-type {
            text-align: center;
            color: var(--twilio-gray-60);
            font-size: 11px;
            margin-top: 24px;
            padding-top: 12px;
            border-top: 1px solid var(--twilio-gray-30);
        }

        /* Print optimizations */
        p, li {
            orphans: 3;
            widows: 3;
        }

        h1, h2, h3 {
            page-break-after: avoid;
        }

        @media print {
            body {
                background: white;
            }
            a {
                color: var(--twilio-blue) !important;
            }
        }
        
    </style>
</head>
<body>
    <div class="container">
        <h1 id="pm-radar-weekly-intelligence-digest">PM Radar Weekly Intelligence Digest</h1>
<p><strong>Date:</strong> 2026-04-15
<strong>Generated:</strong> 2026-04-15 11:44:01 UTC</p>
<hr />
<h2 id="executive-summary">Executive Summary</h2>
<ul>
<li><strong>36</strong> industry articles reviewed</li>
<li><strong>25</strong> Reddit discussions analyzed</li>
</ul>
<hr />
<hr />
<p><em>Generated by PM Radar • 2026-04-15</em></p>
    </div>

        <p style="margin: 0.5em 0 0 0; font-size: 9pt; color: #606B85;">Powered by PM Radar • Twilio Product Intelligence</p>
    </div>
</body>
</html>
