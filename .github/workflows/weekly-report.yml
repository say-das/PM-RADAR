name: Weekly PM Radar Report

on:
  schedule:
    # Runs every Thursday at 1:30 PM UTC (7:00 PM IST)
    - cron: '30 13 * * 4'
  workflow_dispatch:  # Allows manual trigger

jobs:
  generate-report:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Install GitHub CLI
      run: |
        sudo apt-get update
        sudo apt-get install -y gh

    - name: Run PM Radar pipeline
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        SOCIAVAULT_API_KEY: ${{ secrets.SOCIAVAULT_API_KEY }}
        BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        cd "Experiments/PM Radar"
        python scripts/main.py

    - name: Commit and push report
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add data/reports/*.md data/reports/*.html docs/reports/*.html
        git diff --staged --quiet || git commit -m "Weekly PM Radar Report - $(date +%Y-%m-%d)

        Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>"
        git push
