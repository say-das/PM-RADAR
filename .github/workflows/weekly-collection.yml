name: Weekly Product Intelligence Collection

on:
  schedule:
    - cron: '0 6 * * 1'  # Monday 6am UTC
  workflow_dispatch:      # Manual trigger for testing

jobs:
  collect-analyze-deliver:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run collection pipeline
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SOCIAVAULT_API_KEY: ${{ secrets.SOCIAVAULT_API_KEY }}
          BREVO_API_KEY: ${{ secrets.BREVO_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: python scripts/main.py

      - name: Commit collected data
        run: |
          git config user.name "PM Radar Bot"
          git config user.email "radar@twilio.com"
          git add data/
          git commit -m "Weekly collection: $(date +'%Y-%m-%d')" || echo "No changes to commit"
          git push
