# Fraud & Security Intelligence Topic

id: fraud
name: "Fraud & Security Intelligence"
enabled: true
feature_flag_v2: true  # V2 enabled - using new architecture

llm:
  provider: openai
  model: gpt-4o
  api_key_env: OPENAI_API_KEY

sources:
  - type: rss
    config_path: rss.yaml
  - type: reddit
    api_key_env: SOCIALCRAWL_API_KEY
    config_path: reddit.yaml
  - type: changelog
    config_path: changelogs.yaml

categories:
  - telecom_fraud
  - general_fraud
  - regulatory

prompts_path: prompts.yaml

report:
  sections:
    - type: executive_summary

    - type: top_items
      config:
        title: "🔴 Top Threats"
        category: "telecom_fraud"
        limit: 5

    - type: top_items
      config:
        title: "🟡 General Security"
        category: "general_fraud"
        limit: 3

    - type: reddit_community
      config:
        title: "## Twilio Community Discussions (Reddit)"

    - type: regulatory_changes

    - type: competitive_intel
      config:
        sources: ["competitor_changelogs"]

    - type: sources

email:
  # Recipients are loaded from config/recipients.yaml (gitignored)
  # See config/recipients.yaml.example for template
  recipients_from_config: true
